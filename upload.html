<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>上傳照片 / Tải ảnh lên</title>
<style>
:root{--bg:#0f1a0f;--bg2:#1a2e1a;--bg3:#243824;--text:#e8f5e8;--text2:#a0c8a0;--text3:#5a8a5a;--acc:#a3e635;--accdim:rgba(163,230,53,.1);--border:#2a3a2a;--border2:#3a4a3a;--r:10px;--rl:14px;--green:#6ee7b7;--red:#f87171;--amber:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px}
.header-title{font-size:16px;font-weight:600;color:var(--acc)}
.header-sub{font-size:11px;color:var(--text3)}
.container{padding:20px;max-width:500px;margin:0 auto}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:14px}
.section-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.field{margin-bottom:12px}
.flabel{font-size:11px;color:var(--text2);margin-bottom:5px;display:block}
.inp{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.inp:focus{border-color:var(--acc)}
.plant-grid{display:flex;flex-direction:column;gap:8px}
.plant-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
.plant-card:hover{border-color:var(--acc)}
.plant-card.selected{border-color:var(--acc);background:var(--accdim)}
.plant-name{font-size:14px;font-weight:500}
.plant-rid{font-family:monospace;font-size:12px;color:var(--amber)}
.plant-loc{font-size:11px;color:var(--text3);margin-top:2px}
.upload-area{border:2px dashed var(--border2);border-radius:var(--rl);padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upload-area:hover{border-color:var(--acc);background:var(--accdim)}
.upload-icon{font-size:40px;margin-bottom:8px}
.upload-text{font-size:14px;color:var(--text2);margin-bottom:4px}
.upload-hint{font-size:11px;color:var(--text3)}
#file-input{position:absolute;inset:0;opacity:0;cursor:pointer}
.preview-wrap{position:relative;margin-top:12px}
#preview-img{width:100%;border-radius:var(--r);display:none;max-height:300px;object-fit:cover}
.preview-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center}
.camera-btn{width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;font-family:inherit}
.camera-btn:hover{border-color:var(--acc);color:var(--acc)}
.weight-wrap{display:flex;gap:8px;align-items:center}
.weight-wrap .inp{flex:1}
.weight-unit{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;color:var(--text3);font-size:14px}
.submit-btn{width:100%;padding:16px;background:var(--acc);border:none;border-radius:var(--r);color:#0f1a0f;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.submit-btn:not(:disabled):hover{opacity:.9}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:999;display:none;white-space:normal;max-width:90vw;word-break:break-all;text-align:center}
.toast.success{background:#166534;color:#6ee7b7;border:1px solid #166534}
.toast.error{background:#7f1d1d;color:#fca5a5;border:1px solid #7f1d1d}
.progress{display:none;text-align:center;padding:20px}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.record-list{display:flex;flex-direction:column;gap:8px}
.record-item{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;display:flex;gap:10px;align-items:center}
.record-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--bg2)}
.record-info{flex:1;min-width:0}
.selected-badge{background:var(--accdim);border:1px solid var(--acc);border-radius:var(--r);padding:10px 14px;color:var(--acc);font-size:13px;font-weight:600;text-align:center;margin-bottom:8px;display:none}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">🌿 上傳植物照片</div>
    <div class="header-sub">Tải ảnh cây lên / Upload Plant Photo · v1.4</div>
  </div>
</div>
<div class="container">
  <div class="section">
    <div class="section-title">選擇植物 / Chọn cây</div>
    <div class="selected-badge" id="selected-badge"></div>
    <div class="field"><input class="inp" id="search-plant" placeholder="搜尋植物名稱或R編號..." oninput="filterPlants(this.value)"></div>
    <div class="plant-grid" id="plant-list"><div style="text-align:center;color:var(--text3);padding:20px;font-size:13px">載入中...</div></div>
  </div>
  <div class="section">
    <div class="section-title">拍照上傳 / Chụp ảnh</div>
    <button class="camera-btn" onclick="document.getElementById('camera-input').click()">📷 直接拍照 / Chụp ảnh trực tiếp</button>
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)">
    <div class="upload-area" id="upload-area">
      <input type="file" id="file-input" accept="image/*" onchange="handleFile(this)">
      <div class="upload-icon">🖼️</div>
      <div class="upload-text">從相簿選擇 / Chọn từ thư viện</div>
      <div class="upload-hint">JPG, PNG, HEIC</div>
    </div>
    <div class="preview-wrap">
      <img id="preview-img" alt="預覽">
      <button class="preview-remove" id="remove-btn" onclick="removePhoto()">✕</button>
    </div>
  </div>
  <div class="section">
    <div class="section-title">數據記錄 / Ghi dữ liệu</div>
    <div class="field">
      <label class="flabel">重量 / Trọng lượng</label>
      <div class="weight-wrap"><input class="inp" id="weight-input" type="number" placeholder="例：284" min="0"><div class="weight-unit">g</div></div>
    </div>
    <div class="field">
      <label class="flabel">備註 / Ghi chú</label>
      <input class="inp" id="note-input" placeholder="今天狀況、澆水記錄...">
    </div>
  </div>
  <div class="progress" id="progress"><div class="spinner"></div><div style="color:var(--text2);font-size:13px">上傳中...</div></div>
  <button class="submit-btn" id="submit-btn" onclick="submitUpload()" disabled>📤 上傳照片 / Tải ảnh lên</button>
  <div class="section" id="records-section" style="margin-top:20px;display:none">
    <div class="section-title">今日上傳 / Đã tải hôm nay</div>
    <div class="record-list" id="record-list"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB='https://edvklxnzhuhmijdwyzrl.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdmtseG56aHVobWlqZHd5enJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2OTE4MTQsImV4cCI6MjA5MzI2NzgxNH0.65Vf-XUlPZmhc-LWqzXq55bpR6RcG8iqNybf_bqyd60';
const LOC={mine:'我家',quang:'Quang家',helper:'小幫手家'};
let allPlants=[],selectedPlant=null,selectedFile=null;

async function loadPlants(){
  try{
    const r=await fetch(SB+'/rest/v1/rehab?select=*&order=rid',{headers:{apikey:SK,Authorization:'Bearer '+SK}});
    allPlants=await r.json();
    if(!Array.isArray(allPlants)){allPlants=[];showToast('載入植物失敗：'+JSON.stringify(allPlants),'error');return;}
    renderPlants(allPlants);
    const urlRid=new URLSearchParams(location.search).get('rid');
    if(urlRid){
      const plant=allPlants.find(p=>p.rid===urlRid.toUpperCase());
      if(plant){selectPlant(plant.id);document.getElementById('search-plant').value=urlRid;filterPlants(urlRid);}
    }
  }catch(e){showToast('載入錯誤：'+e.message,'error');}
}

function renderPlants(plants){
  const el=document.getElementById('plant-list');
  if(!plants.length){el.innerHTML='<div style="text-align:center;color:var(--text3);padding:20px;font-size:13px">沒有找到植物</div>';return;}
  el.innerHTML=plants.map(p=>'<div class="plant-card '+(selectedPlant&&selectedPlant.id===p.id?'selected':'')+'" onclick="selectPlant('+p.id+')"><div><div class="plant-name">'+p.plant_name+'</div><div class="plant-loc">'+(LOC[p.loc]||p.loc||'')+'</div></div><div class="plant-rid">'+p.rid+'</div></div>').join('');
}

function filterPlants(q){renderPlants(allPlants.filter(p=>(p.plant_name||'').includes(q)||(p.rid||'').toLowerCase().includes(q.toLowerCase())));}

function selectPlant(id){
  selectedPlant=allPlants.find(p=>p.id===id);
  renderPlants(allPlants);
  const badge=document.getElementById('selected-badge');
  if(selectedPlant){badge.textContent='✓ 已選：'+selectedPlant.plant_name+' ('+selectedPlant.rid+')';badge.style.display='block';}
  checkReady();
}

function handleFile(input){
  const file=input.files[0];if(!file)return;
  selectedFile=file;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('preview-img').src=e.target.result;
    document.getElementById('preview-img').style.display='block';
    document.getElementById('remove-btn').style.display='flex';
  };
  reader.readAsDataURL(file);checkReady();
}

function removePhoto(){
  selectedFile=null;
  document.getElementById('preview-img').style.display='none';
  document.getElementById('remove-btn').style.display='none';
  document.getElementById('file-input').value='';
  document.getElementById('camera-input').value='';
  checkReady();
}

function checkReady(){document.getElementById('submit-btn').disabled=!(selectedPlant&&selectedFile);}

async function submitUpload(){
  if(!selectedPlant||!selectedFile)return;
  const weight=document.getElementById('weight-input').value;
  const note=document.getElementById('note-input').value;
  const base64=await compressImage(selectedFile,1200,.85);
  document.getElementById('progress').style.display='block';
  document.getElementById('submit-btn').disabled=true;
  try{
    const r=await fetch('/api/upload-photo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64:base64,rid:selectedPlant.rid,plantName:selectedPlant.plant_name,weightG:weight||null,note:note||null,uploadedBy:'owner'})});
    const data=await r.json();
    if(!r.ok)throw new Error(JSON.stringify(data));
    showToast('✅ 上傳成功！','success');
    removePhoto();
    document.getElementById('weight-input').value='';
    document.getElementById('note-input').value='';
    loadTodayRecords();
  }catch(err){showToast('❌ '+err.message,'error');}
  finally{document.getElementById('progress').style.display='none';checkReady();}
}

function compressImage(file,maxWidth,quality){
  return new Promise(resolve=>{
    const canvas=document.createElement('canvas');
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(maxWidth/img.width,maxWidth/img.height,1);
      canvas.width=img.width*ratio;canvas.height=img.height*ratio;
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.src=URL.createObjectURL(file);
  });
}

async function loadTodayRecords(){
  const today=new Date().toISOString().split('T')[0];
  try{
    const r=await fetch(SB+'/rest/v1/photos?select=*&order=created_at.desc&limit=20',{headers:{apikey:SK,Authorization:'Bearer '+SK}});
    const records=await r.json();
    if(!Array.isArray(records)||!records.length){document.getElementById('records-section').style.display='none';return;}
    const todayRecords=records.filter(r=>(r.created_at||'').slice(0,10)===today);
    if(!todayRecords.length){document.getElementById('records-section').style.display='none';return;}
    document.getElementById('records-section').style.display='block';
    document.getElementById('record-list').innerHTML=todayRecords.map(r=>'<div class="record-item"><img class="record-thumb" src="'+(r.photo_url||'')+'" onerror="this.style.display=\'none\'"><div class="record-info"><div style="display:flex;justify-content:space-between"><div style="font-size:13px;font-weight:500">'+(r.plant_name||r.rid||'-')+'</div><div style="font-family:monospace;font-size:11px;color:var(--amber)">'+(r.rid||'')+'</div></div>'+(r.weight_g?'<div style="font-size:12px;color:var(--green)">⚖️ '+r.weight_g+'g</div>':'')+'</div></div>').join('');
  }catch(e){document.getElementById('records-section').style.display='none';}
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+type;
  t.style.display='block';
  if(type==='success'){setTimeout(()=>t.style.display='none',3500);}
}

document.getElementById('upload-area').addEventListener('dragover',e=>{e.preventDefault();});
document.getElementById('upload-area').addEventListener('drop',e=>{
  e.preventDefault();
  const file=e.dataTransfer.files[0];
  if(file&&file.type.startsWith('image/')){
    const dt=new DataTransfer();dt.items.add(file);
    document.getElementById('file-input').files=dt.files;
    handleFile(document.getElementById('file-input'));
  }
});

loadPlants();
loadTodayRecords();
</script>
</body>
</html>
